<!doctype html>
<html>
  <head>
    <title>Foodies 'R' Us Blog Register</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/errorMsg.js" defer></script>
  </head>
  <body>
    <header>
      <a href="../html/index.html"><img id="logo" src="../imgs/logo.png" /></a>
      <h1>Welcome to Foodies 'R' Us!</h1>
    </header>
    <main>
      <p>Create an account and then set up your authenticator app.</p>

      <form method="post" action="/register" id="registerForm">
        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Please choose a username..."
        />

        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Please choose a password..."
        />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Please enter your email..."
        />

        <button id="loginBtn" type="submit">Register</button>
      </form>
      <p><a href="/login">Already have an account? Log in here.</a></p>
      <p id="error-msg" class="error hidden"></p>
    </main>
  </body>
</html>
