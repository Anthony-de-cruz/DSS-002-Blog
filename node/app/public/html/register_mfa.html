<!doctype html>
<html>
  <head>
    <title>Foodies 'R' Us Blog MFA Setup</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/errorMsg.js" defer></script>
  </head>
  <body>
    <header>
      <a href="../html/index.html"><img id="logo" src="../imgs/logo.png" /></a>
      <h1>Welcome to Foodies 'R' Us!</h1>
    </header>
    <main>
      <p>
        Scan this QR code in your authenticator app to finish setting up your
        account.
      </p>
      <img src="__QR_CODE_DATA_URL__" alt="Authenticator QR code" />
      <form method="post" action="/register/mfa" id="registerMfaForm">
        <label for="totp">One Time Password:</label>
        <input
          type="text"
          id="totp"
          name="totp"
          placeholder="Please enter your one time password..."
        />
        <button id="loginBtn" type="submit">Complete Registration</button>
      </form>
      <p id="error-msg" class="error hidden"></p>
    </main>
  </body>
</html>
