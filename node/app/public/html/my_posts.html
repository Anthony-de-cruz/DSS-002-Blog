<!doctype html>
<html>
  <head>
    <title>Cyber Security Safety</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="../js/my_posts.js" defer></script>
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header>
      <a href="/"><img id="logo" src="../imgs/lock.png" /></a>
      <h1>Cyber Security Safety</h1>
      <div class="dropdown">
        <button id="login_link" type="button">Username</button>
        <div class="dropdown-content">
          <a id="accountBtn" href="/account">My Account</a>
          <a id="logout_btn" href="/logout">Log out</a>
        </div>
      </div>
    </header>

    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/posts">Latest Posts</a></li>
        <li class="active"><a href="/posts/my">My Posts</a></li>
      </ul>
    </nav>

    <main>
      <section>
        <h2>Share your Cyber Security thoughts</h2>
        <p>Post about anything Cyber Security related and more!</p>

        <form action="/api/posts" method="post" id="postForm" name="postForm">
          <fieldset>
            <legend>Compose a Post</legend>
            <label for="title_field">Post Title:</label>
            <input
              id="title_field"
              name="title_field"
              type="text"
              placeholder="Title"
              required
            />

            <label for="content_field">Post Content:</label>
            <textarea
              id="content_field"
              name="content_field"
              placeholder="Write your thoughts here.."
              required
            ></textarea>
            <!-- <input id="content_field" name="content_field" type="text"> -->

            <input id="postId" name="postId" type="hidden" />

            <button type="submit" id="post_button">Post</button>
          </fieldset>
        </form>
      </section>

      <section id="myPosts">
        <h2>Your Posts</h2>
        <p>See all the posts you've made so far.</p>

        <i class="fa fa-search" aria-hidden="true"></i>
        <input
          class="search_bar"
          id="search"
          name="search"
          type="text"
          placeholder="Search your posts..."
        />
      </section>
    </main>
  </body>
</html>
