<!DOCTYPE html>
<html>
    <head>
        <title> Foodies 'R' Us Blog Login</title>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico">
        <link rel="stylesheet" href="../css/style.css">
        <!-- <script src="../js/login.js" defer></script> -->
    </head>
    <body>
        <header>
            <a href="../html/index.html"><img id="logo" src="../imgs/logo.png"></a>
            <h1>Welcome to Foodies 'R' Us!</h1>
        </header>
        <main>
        <p>Please enter your username and password to continue.</p>

        <form method="post" action="/login" id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Please enter your username...">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Please enter your password...">

            <button id="loginBtn" type="submit">Log in</button>
        </form>
        </main>
    </body>
</html>
