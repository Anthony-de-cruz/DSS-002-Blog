<!doctype html>
<html>
  <head>
    <title>Cyber Security Safety Blog Login</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/account.js" defer></script>
    <script src="../js/errorMsg.js" defer></script>
  </head>
  <body>
    <header>
      <a href="/"><img id="logo" src="../imgs/lock.png" /></a>
      <h1>Cyber Security Safety</h1>
      <div class="dropdown">
        <button id="login_link" type="button">Username</button>
        <div class="dropdown-content">
          <a id="accountBtn" href="/account">My Account</a>
          <a id="logout_btn" href="/logout">Log out</a>
        </div>
      </div>
    </header>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/posts">Latest Posts</a></li>
        <li><a href="/posts/my">My Posts</a></li>
      </ul>
    </nav>
    <main>
      <p>You must reauthenticate in order to update account values.</p>
      <p>Please enter your One Time Password to continue.</p>

      <form method="post" action="/account/elevate" id="loginForm">
        <label for="totp">One Time Password:</label>
        <input
          type="text"
          id="totp"
          name="totp"
          placeholder="Please enter your one time password..."
        />
        <button id="loginBtn" type="submit">Log in</button>
      </form>
      <p id="error-msg" class="error hidden"></p>
    </main>
  </body>
</html>
